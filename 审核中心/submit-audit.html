            <!-- 內容區 -->
            <div class="content">
                <div class="page-header">
                    <h1 class="page-title">發起審批</h1>
                    <p class="page-desc">填寫申請信息，提交審核申請</p>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">申請信息</span>
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="form-row">
                                <div class="form-group" style="flex: 1;">
                                    <label class="form-label"><span class="required">*</span> 申請標題</label>
                                    <input type="text" class="form-control" placeholder="請輸入申請標題，例如：VIP會員充值獎勵">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label"><span class="required">*</span> 商戶名稱</label>
                                    <select class="form-control">
                                        <option value="">請選擇商戶</option>
                                        <option value="GS">GS</option>
                                        <option value="GE">GE</option>
                                        <option value="MY">MY</option>
                                        <option value="MN">MN</option>
                                        <option value="MJ">MJ</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label"><span class="required">*</span> 審核類型</label>
                                    <select class="form-control">
                                        <option value="">請選擇審核類型</option>
                                        <option value="1">資金審核</option>
                                        <option value="2">賬戶安全審核</option>
                                        <option value="3">人工充值</option>
                                        <option value="4">人工提現</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label"><span class="required">*</span> 申請金額</label>
                                    <input type="text" class="form-control" placeholder="請輸入金額">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">用戶名</label>
                                    <input type="text" class="form-control" placeholder="請輸入用戶名">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">用戶ID</label>
                                    <input type="text" class="form-control" placeholder="請輸入用戶ID">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">帳變類型</label>
                                    <select class="form-control">
                                        <option value="">請選擇帳變類型</option>
                                        <option value="110">110 - 普通充值</option>
                                        <option value="220">220 - 活動獎勵</option>
                                        <option value="221">221 - VIP晉級獎勵</option>
                                        <option value="310">310 - 普通提現</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group full">
                                    <label class="form-label"><span class="required">*</span> 申請說明</label>
                                    <textarea class="form-control textarea" placeholder="請詳細描述申請原因和相關信息..." style="min-height: 120px;"></textarea>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group full">
                                    <label class="form-label">相關附件</label>
                                    <div class="upload-area">
                                        <div class="upload-icon">
                                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                                <polyline points="17 8 12 3 7 8"></polyline>
                                                <line x1="12" y1="3" x2="12" y2="15"></line>
                                            </svg>
                                        </div>
                                        <div class="upload-text">
                                            將文件拖到此處，或 <em>點擊上傳</em>
                                        </div>
                                        <div class="upload-hint">
                                            支持 jpg、png、pdf 格式，單個文件不超過 10MB
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="form-row" style="margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border-lighter);">
                                <div class="btn-group">
                                    <button type="button" class="btn btn-primary btn-lg" onclick="handleSubmit()">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <line x1="22" y1="2" x2="11" y2="13"></line>
                                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                        </svg>
                                        提交申請
                                    </button>
                                    <button type="button" class="btn btn-default btn-lg" onclick="handleReset()">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                                            <path d="M3 3v5h5"></path>
                                        </svg>
                                        重置表單
                                    </button>
                                    <button type="button" class="btn btn-default btn-lg" onclick="handleSaveDraft()">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                                            <polyline points="7 3 7 8 15 8"></polyline>
                                        </svg>
                                        保存草稿
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 主題切換功能
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // 頁面載入時檢查已保存的主題
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();

        // 菜單展開/收起
        document.querySelectorAll('.menu-item > .menu-title').forEach(title => {
            if (title.querySelector('.menu-arrow')) {
                title.addEventListener('click', function(e) {
                    e.preventDefault();
                    const menuItem = this.parentElement;
                    menuItem.classList.toggle('open');
                });
            }
        });

        // 提交申請
        function handleSubmit() {
            if (confirm('確定要提交此審核申請嗎？')) {
                alert('申請已成功提交！');
                window.location.href = 'pending-list.html';
            }
        }

        // 重置表單
        function handleReset() {
            if (confirm('確定要重置表單嗎？所有已填寫的內容將被清空。')) {
                document.querySelector('form').reset();
            }
        }

        // 保存草稿
        function handleSaveDraft() {
            alert('草稿已保存！');
        }
    </script>
