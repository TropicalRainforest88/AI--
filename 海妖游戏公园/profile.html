<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海妖游戏公园 - 我的</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .theme-toggle {
            position: absolute;
            top: 56px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: all 0.3s ease;
        }
        .theme-toggle .icon-sun, .theme-toggle .icon-moon { font-size: 18px; }
        .theme-toggle .icon-moon { display: none; }
        [data-theme="dark"] .theme-toggle .icon-sun { display: none; }
        [data-theme="dark"] .theme-toggle .icon-moon { display: block; }
        [data-theme="dark"] .theme-toggle { background: rgba(59, 163, 150, 0.2); border-color: rgba(59, 163, 150, 0.3); }
    </style>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('siren-theme');
            if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>
    <div class="phone-frame">
        <div class="page">
            <!-- 顶部状态栏 -->
            <div class="status-bar light">
                <span class="status-bar-time">9:41</span>
                <div class="status-bar-icons">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 10a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    </svg>
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <rect x="1" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                        <rect x="20" y="9" width="3" height="6" rx="1" fill="currentColor"/>
                        <rect x="3" y="8" width="12" height="8" rx="1" fill="currentColor"/>
                    </svg>
                </div>
            </div>

            <!-- 主题切换按钮 -->
            <button class="theme-toggle" onclick="toggleTheme()" title="切换白天/黑夜模式">
                <span class="icon-sun">☀️</span>
                <span class="icon-moon">🌙</span>
            </button>

            <!-- 用户信息头部 -->
            <div class="profile-header">
                <div class="profile-avatar">🧜</div>
                <div class="profile-name">海洋玩家</div>
                <div class="profile-id">ID: 88881234</div>
            </div>

            <!-- 页面内容 -->
            <div class="page-content">
                <!-- 用户统计 -->
                <div class="profile-stats">
                    <div class="profile-stat-item">
                        <div class="profile-stat-value">12,580</div>
                        <div class="profile-stat-label">金币余额</div>
                    </div>
                    <div class="profile-stat-item">
                        <div class="profile-stat-value">￥2,350</div>
                        <div class="profile-stat-label">累计充值</div>
                    </div>
                    <div class="profile-stat-item">
                        <div class="profile-stat-value">36</div>
                        <div class="profile-stat-label">游戏场次</div>
                    </div>
                </div>

                <!-- 快捷操作 -->
                <div class="card">
                    <div class="card-body" style="padding: 12px 16px;">
                        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center;">
                            <a href="recharge.html" style="text-decoration: none;">
                                <div style="font-size: 28px; margin-bottom: 4px;">💰</div>
                                <div style="font-size: 12px; color: var(--text-regular);">充值</div>
                            </a>
                            <a href="withdraw.html" style="text-decoration: none;">
                                <div style="font-size: 28px; margin-bottom: 4px;">💸</div>
                                <div style="font-size: 12px; color: var(--text-regular);">提现</div>
                            </a>
                            <a href="history.html" style="text-decoration: none;">
                                <div style="font-size: 28px; margin-bottom: 4px;">📋</div>
                                <div style="font-size: 12px; color: var(--text-regular);">账单</div>
                            </a>
                            <a href="activity.html" style="text-decoration: none;">
                                <div style="font-size: 28px; margin-bottom: 4px;">🎁</div>
                                <div style="font-size: 12px; color: var(--text-regular);">福利</div>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 功能列表 -->
                <div class="list" style="margin: 16px; border-radius: var(--radius-lg); overflow: hidden;">
                    <a href="game-history.html" class="list-item">
                        <div class="list-icon pearl-icon pearl-gold">🎮</div>
                        <div class="list-content">
                            <div class="list-title">游戏记录</div>
                            <div class="list-desc">查看您的游戏历史</div>
                        </div>
                        <div class="list-arrow">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </div>
                    </a>
                    <a href="transaction.html" class="list-item">
                        <div class="list-icon pearl-icon pearl-teal">💳</div>
                        <div class="list-content">
                            <div class="list-title">交易记录</div>
                            <div class="list-desc">充值提现明细</div>
                        </div>
                        <div class="list-arrow">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </div>
                    </a>
                    <a href="bank-card.html" class="list-item">
                        <div class="list-icon pearl-icon pearl-sand">🏦</div>
                        <div class="list-content">
                            <div class="list-title">银行卡管理</div>
                            <div class="list-desc">绑定提现银行卡</div>
                        </div>
                        <div class="list-arrow">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </div>
                    </a>
                </div>

                <!-- 更多服务 -->
                <div class="list" style="margin: 16px; border-radius: var(--radius-lg); overflow: hidden;">
                    <a href="security.html" class="list-item">
                        <div class="list-icon pearl-icon pearl-coral">🔐</div>
                        <div class="list-content">
                            <div class="list-title">账户安全</div>
                            <div class="list-desc">密码、验证设置</div>
                        </div>
                        <div class="list-arrow">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </div>
                    </a>
                    <a href="message.html" class="list-item">
                        <div class="list-icon pearl-icon pearl-teal">💬</div>
                        <div class="list-content">
                            <div class="list-title">消息中心</div>
                            <div class="list-desc">系统通知、活动消息</div>
                        </div>
                        <span class="badge badge-danger" style="margin-right: 8px;">3</span>
                        <div class="list-arrow">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </div>
                    </a>
                    <a href="customer-service.html" class="list-item">
                        <div class="list-icon pearl-icon pearl-olive">🎧</div>
                        <div class="list-content">
                            <div class="list-title">在线客服</div>
                            <div class="list-desc">7x24小时服务</div>
                        </div>
                        <div class="list-arrow">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </div>
                    </a>
                    <a href="settings.html" class="list-item">
                        <div class="list-icon pearl-icon">⚙️</div>
                        <div class="list-content">
                            <div class="list-title">设置</div>
                            <div class="list-desc">通用设置、关于我们</div>
                        </div>
                        <div class="list-arrow">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </div>
                    </a>
                </div>

                <!-- 退出登录 -->
                <div style="padding: 16px;">
                    <button class="btn btn-outline btn-block" onclick="alert('确定要退出登录吗？')">退出登录</button>
                </div>

                <!-- 底部间距 -->
                <div style="height: 80px;"></div>
            </div>

            <!-- 底部标签栏 -->
            <div class="tab-bar">
                <a href="index.html" class="tab-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span>首页</span>
                </a>
                <a href="activity.html" class="tab-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                    <span>活动</span>
                </a>
                <a href="recharge.html" class="tab-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                        <line x1="2" y1="10" x2="22" y2="10"></line>
                    </svg>
                    <span>充值</span>
                </a>
                <a href="profile.html" class="tab-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span>我的</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('siren-theme', newTheme);
        }
    </script>
</body>
</html>
